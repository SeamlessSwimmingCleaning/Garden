<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌻 My Garden</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1c1917;
    --muted: #78716c;
    --border: #e7e5e4;
    --primary: #059669;
    --primary-hover: #047857;
    --primary-fg: #ffffff;
    --secondary: #f5f5f4;
    --secondary-hover: #e7e5e4;
    --amber: #d97706;
    --amber-bg: #fffbeb;
    --amber-border: #fcd34d;
    --emerald-bg: #ecfdf5;
    --emerald-border: #6ee7b7;
    --orange-bg: #fff7ed;
    --orange-border: #fdba74;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --stone-bg: #f5f5f4;
    --stone-border: #d6d3d1;
    --red: #dc2626;
    --blue: #3b82f6;
    --radius: 0.75rem;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(to bottom, #ecfdf5 30%, #ffffff 60%, #fffbeb 90%);
    color: var(--fg);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 896px; margin: 0 auto;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo h1 { font-size: 18px; font-weight: 700; color: var(--fg); letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .coin-badge {
    display: flex; align-items: center; gap: 4px;
    background: var(--amber-bg);
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--amber-border);
    font-weight: 700; color: var(--amber); font-size: 14px;
  }
  .harvest-badge {
    display: none; align-items: center; gap: 4px;
    color: var(--muted); font-size: 12px;
  }
  @media (min-width: 640px) { .harvest-badge { display: flex; } }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border-radius: var(--radius);
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--fg); color: #fafaf9; }
  .btn-primary:hover { background: #292524; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: var(--bg); color: var(--fg); border-color: var(--border); }
  .btn-outline:hover { background: var(--secondary); }
  .btn-outline:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-emerald { background: var(--primary); color: var(--primary-fg); }
  .btn-emerald:hover { background: var(--primary-hover); }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: #2563eb; }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--secondary); color: var(--fg); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Garden */
  main { max-width: 896px; margin: 0 auto; padding: 24px 16px 60px; }
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(2, 1fr);
  }
  @media (min-width: 640px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 1024px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  /* Plot Card */
  .plot {
    position: relative; border: 2px solid; border-radius: var(--radius);
    padding: 16px; display: flex; flex-direction: column; align-items: center;
    min-height: 200px; transition: all 0.2s;
  }
  .plot-empty {
    background: var(--amber-bg); border-style: dashed; border-color: var(--amber-border);
    cursor: pointer; justify-content: center;
  }
  .plot-empty:hover { background: #fef3c7; }
  .plot-empty .emoji { font-size: 36px; margin-bottom: 8px; }
  .plot-empty .label { color: var(--amber); font-weight: 600; font-size: 13px; }
  .plot-empty .hint { color: var(--amber); font-size: 11px; margin-top: 4px; opacity: 0.7; }

  .plot-dead {
    background: var(--stone-bg); border-color: var(--stone-border); justify-content: center;
  }
  .plot-dead .emoji { font-size: 36px; margin-bottom: 4px; filter: grayscale(1); opacity: 0.6; }
  .plot-dead .label { color: #78716c; font-weight: 600; font-size: 13px; }
  .plot-dead .sub { color: var(--red); font-size: 11px; margin-top: 4px; }

  .plot-growing { justify-content: flex-start; }
  .plot-ready { background: var(--emerald-bg); border-color: var(--emerald-border); box-shadow: 0 6px 20px rgba(110,231,183,0.3); }
  .plot-thirsty { background: var(--orange-bg); border-color: var(--orange-border); }
  .plot-healthy { background: var(--green-bg); border-color: var(--green-border); }

  .badge-top {
    position: absolute; top: -8px; right: -8px;
    font-size: 11px; padding: 2px 8px; border-radius: 999px;
    font-weight: 700; color: white; white-space: nowrap;
  }
  .badge-thirsty { background: #fb923c; animation: bounce 1.5s infinite; }
  .badge-ready { background: var(--primary); animation: pulse 2s infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .plant-emoji {
    font-size: 48px; margin-bottom: 8px;
    animation: growIn 0.4s ease-out;
  }
  @keyframes growIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .plant-name { font-weight: 600; font-size: 13px; color: var(--fg); text-align: center; }

  .phase-dots { display: flex; gap: 4px; margin: 8px 0; }
  .phase-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--border); }
  .phase-dot.active { background: var(--primary); }

  .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; margin-bottom: 4px; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 999px; transition: width 0.3s; }
  .time-left { font-size: 10px; color: var(--muted); text-align: center; }

  .water-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .water-bar-bg { width: 64px; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .water-bar-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }
  .water-bar-fill.low { background: #fb923c; }
  .water-bar-fill.ok { background: var(--blue); }

  .actions { display: flex; gap: 8px; margin-top: auto; }

  /* Modal / Overlay */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: flex-end; justify-content: center;
    background: rgba(0,0,0,0.4);
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay-content {
    width: 100%; max-width: 28rem; max-height: 85vh;
    background: var(--bg); border-radius: 1rem 1rem 0 0;
    box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; overflow: hidden;
    animation: slideUp 0.3s ease-out;
  }
  @media (min-width: 640px) { .overlay { align-items: center; } .overlay-content { border-radius: 1rem; animation: popIn 0.2s; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .overlay-header { padding: 20px 20px 12px; border-bottom: 1px solid var(--border); background: linear-gradient(to right, #ecfdf5, #fffbeb); }
  .overlay-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; justify-content: space-between; }
  .overlay-coins { font-size: 14px; font-weight: 700; color: var(--amber); }
  .overlay-body { padding: 16px; overflow-y: auto; flex: 1; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 6px 12px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--fg); }
  .tab.active { background: var(--fg); color: #fafaf9; border-color: var(--fg); }

  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
  .search-input {
    width: 100%; padding: 8px 12px 8px 36px; border-radius: var(--radius);
    border: 1px solid var(--border); font-size: 14px; background: var(--bg);
    outline: none;
  }
  .search-input:focus { border-color: var(--primary); }

  .plant-list { display: flex; flex-direction: column; gap: 8px; }
  .plant-row {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 0.75rem; background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .plant-row:hover { border-color: var(--emerald-border); background: rgba(236,253,245,0.5); }
  .plant-row:disabled, .plant-row.disabled { opacity: 0.4; cursor: not-allowed; }
  .plant-row .pemoji { font-size: 22px; }
  .plant-row .pinfo { flex: 1; min-width: 0; }
  .plant-row .pname { font-weight: 600; font-size: 14px; }
  .plant-row .pmeta { display: flex; gap: 10px; font-size: 11px; color: var(--muted); margin-top: 2px; flex-wrap: wrap; }
  .plant-row .preward { color: var(--primary); font-weight: 600; }
  .plant-row .pcost { font-size: 12px; font-weight: 700; color: var(--fg); white-space: nowrap; }

  .land-card { padding: 24px; border-radius: 1rem; background: var(--amber-bg); border: 2px solid var(--amber-border); text-align: center; }
  .land-card .emoji { font-size: 48px; margin-bottom: 12px; }
  .land-card .title { font-weight: 700; color: var(--fg); }
  .land-card .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .land-card .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .land-card .btn { margin-top: 16px; }
  .land-next { font-size: 11px; color: var(--muted); text-align: center; margin-top: 12px; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

  .loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(to bottom, #ecfdf5, #fffbeb); }
  .loading-content { text-align: center; }
  .loading-emoji { font-size: 64px; margin-bottom: 16px; animation: sway 2s infinite; }
  @keyframes sway { 0%,100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
  .loading-text { color: var(--muted); font-weight: 600; }
</style>
</head>

function getPlantData(name) { return PLANTS[name] || null; }

function getAllPlants() {
  return Object.entries(PLANTS).map(([name, data]) => ({ name, ...data })).sort((a, b) => a.cost - b.cost);
}

function getGrowthProgress(plantType, plantedAt) {
  const plant = PLANTS[plantType];
  if (!plant) return { phaseIndex: 0, progress: 0, isReady: false, currentEmoji: "🌱" };
  const elapsed = (Date.now() - new Date(plantedAt).getTime()) / 3600000;
  const progress = Math.min(elapsed / plant.growthHours, 1);
  const phaseIndex = Math.min(Math.floor(progress * plant.phases.length), plant.phases.length - 1);
  return { phaseIndex, progress, isReady: progress >= 1, currentEmoji: plant.phases[phaseIndex] };
}

function getWaterStatus(plantType, lastWateredAt) {
  const plant = PLANTS[plantType];
  if (!plant || !lastWateredAt) return { needsWater: true, isDying: false, waterLevel: 0 };
  const hoursSince = (Date.now() - new Date(lastWateredAt).getTime()) / 3600000;
  const waterLevel = Math.max(0, 1 - (hoursSince / plant.waterInterval));
  return { needsWater: waterLevel < 0.3, isDying: waterLevel <= 0, waterLevel };
}

function formatTimeRemaining(plantType, plantedAt) {
  const plant = PLANTS[plantType];
  if (!plant) return "";
  const elapsed = (Date.now() - new Date(plantedAt).getTime()) / 3600000;
  const remaining = Math.max(0, plant.growthHours - elapsed);
  if (remaining <= 0) return "Ready to harvest!";
  if (remaining < 1) return Math.ceil(remaining * 60) + "m left";
  if (remaining < 24) return Math.ceil(remaining) + "h left";
  if (remaining < 168) return Math.ceil(remaining / 24) + "d left";
  return Math.ceil(remaining / 168) + "w left";
}

function formatGrowthTime(hours) {
  if (hours < 1) return Math.round(hours * 60) + "m";
  if (hours < 24) return Math.round(hours) + "h";
  if (hours < 168) return Math.round(hours / 24) + "d";
  return Math.round(hours / 168) + "w";
}

function getLandCost(currentPlots) {
  if (currentPlots < 2) return 0;
  return Math.floor(25 * Math.pow(1.5, currentPlots - 2));
}

// ═══════════════════════════════════════
// SAVE / LOAD (localStorage)
// ═══════════════════════════════════════
const STORAGE_KEY = "myGardenGame_v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {
    coins: 20,
    totalPlots: 2,
    plantsHarvested: 0,
    plots: [
      { id: "p0", slot_index: 0, plant_type: "", planted_at: null, last_watered_at: null, is_dead: false },
      { id: "p1", slot_index: 1, plant_type: "", planted_at: null, last_watered_at: null, is_dead: false }
    ]
  };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

let state = loadState();

// ═══════════════════════════════════════
// GAME ACTIONS
// ═══════════════════════════════════════
function plantSeed(plotId, plantName) {
  const plant = getPlantData(plantName);
  if (!plant || state.coins < plant.cost) return;
  const now = new Date().toISOString();
  const plot = state.plots.find(p => p.id === plotId);
  if (!plot) return;
  plot.plant_type = plantName;
  plot.planted_at = now;
  plot.last_watered_at = now;
  plot.is_dead = false;
  state.coins -= plant.cost;
  saveState();
  render();
}

function waterPlant(plotId) {
  const plot = state.plots.find(p => p.id === plotId);
  if (!plot || !plot.plant_type || plot.is_dead) return;
  plot.last_watered_at = new Date().toISOString();
  saveState();
  render();
}

function harvestPlant(plotId) {
  const plot = state.plots.find(p => p.id === plotId);
  if (!plot || !plot.plant_type) return;
  const { isReady } = getGrowthProgress(plot.plant_type, plot.planted_at);
  if (!isReady) return;
  const plant = getPlantData(plot.plant_type);
  state.coins += plant.reward;
  state.plantsHarvested++;
  plot.plant_type = "";
  plot.planted_at = null;
  plot.last_watered_at = null;
  plot.is_dead = false;
  saveState();
  render();
}

function clearDeadPlant(plotId) {
  const plot = state.plots.find(p => p.id === plotId);
  if (!plot) return;
  plot.plant_type = "";
  plot.planted_at = null;
  plot.last_watered_at = null;
  plot.is_dead = false;
  saveState();
  render();
}

function buyLand() {
  const cost = getLandCost(state.totalPlots);
  if (state.coins < cost) return;
  state.coins -= cost;
  state.totalPlots++;
  state.plots.push({ id: "p" + Date.now(), slot_index: state.totalPlots - 1, plant_type: "", planted_at: null, last_watered_at: null, is_dead: false });
  saveState();
  closeShop();
  render();
}

// ═══════════════════════════════════════
// DEATH CHECK
// ═══════════════════════════════════════
function checkDeaths() {
  let changed = false;
  state.plots.forEach(plot => {
    if (plot.plant_type && !plot.is_dead) {
      const { isDying } = getWaterStatus(plot.plant_type, plot.last_watered_at);
      if (isDying) { plot.is_dead = true; changed = true; }
    }
  });
  if (changed) { saveState(); render(); }
}

// ═══════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════
let shopTab = "seeds";
let shopSearch = "";
let pickerPlotId = null;

function render() {
  const app = document.getElementById("app");

  if (!state) {
    app.innerHTML = '<div class="loading-screen"><div class="loading-content"><div class="loading-emoji">🌱</div><p class="loading-text">Growing your garden...</p></div></div>';
    return;
  }

  let html = '';

  // Header
  html += `<header><div class="header-inner">
    <div class="logo"><span style="font-size:24px">🌻</span><h1>My Garden</h1></div>
    <div class="header-right">
      <div class="coin-badge">🪙 ${state.coins}</div>
      <div class="harvest-badge">🌿 ${state.plantsHarvested} harvested</div>
      <button class="btn btn-primary btn-sm" onclick="openShop()">🛒 <span class="hide-sm">Shop</span></button>
    </div>
  </div></header>`;

  // Garden Grid
  html += '<main><div class="grid">';
  if (state.plots.length === 0) {
    html += '<div class="empty-state"><div class="emoji">🌾</div><p>No plots yet. Visit the shop to get started!</p></div>';
  }
  state.plots.forEach(plot => { html += renderPlot(plot); });
  html += '</div></main>';

  app.innerHTML = html;

  // Render modals if open
  if (document.getElementById("shop-overlay")) renderShop();
  if (document.getElementById("picker-overlay")) renderPicker();
}

function renderPlot(plot) {
  if (!plot.plant_type) {
    return `<div class="plot plot-empty" onclick="openPicker('${plot.id}')">
      <div class="emoji">🟫</div>
      <div class="label">Empty Plot</div>
      <div class="hint">Tap to plant</div>
    </div>`;
  }

  if (plot.is_dead) {
    return `<div class="plot plot-dead">
      <div class="emoji">🥀</div>
      <div class="label">${plot.plant_type}</div>
      <div class="sub">💀 Died — not watered</div>
      <button class="btn btn-outline btn-sm" style="margin-top:12px" onclick="clearDeadPlant('${plot.id}')">✂️ Clear Plot</button>
    </div>`;
  }

  const plant = getPlantData(plot.plant_type);
  const { phaseIndex, progress, isReady, currentEmoji } = getGrowthProgress(plot.plant_type, plot.planted_at);
  const { needsWater, waterLevel } = getWaterStatus(plot.plant_type, plot.last_watered_at);
  const timeLeft = formatTimeRemaining(plot.plant_type, plot.planted_at);

  let cls = "plot plot-growing";
  if (isReady) cls += " plot-ready";
  else if (needsWater) cls += " plot-thirsty";
  else cls += " plot-healthy";

  let badge = "";
  if (isReady) badge = `<div class="badge-top badge-ready">✨ Ready!</div>`;
  else if (needsWater) badge = `<div class="badge-top badge-thirsty">💧 Thirsty!</div>`;

  let dots = '<div class="phase-dots">';
  plant.phases.forEach((_, i) => {
    dots += `<div class="phase-dot${i <= phaseIndex ? " active" : ""}"></div>`;
  });
  dots += '</div>';

  let waterHtml = "";
  if (!isReady) {
    waterHtml = `<div class="water-row">
      <span>${needsWater ? "🟠" : "💧"}</span>
      <div class="water-bar-bg"><div class="water-bar-fill ${needsWater ? "low" : "ok"}" style="width:${waterLevel * 100}%"></div></div>
    </div>`;
  }

  let actionHtml;
  if (isReady) {
    actionHtml = `<button class="btn btn-emerald btn-sm" onclick="harvestPlant('${plot.id}')">✨ Harvest +${plant.reward}🪙</button>`;
  } else {
    actionHtml = `<button class="btn ${needsWater ? "btn-blue" : "btn-outline"} btn-sm" ${needsWater ? "" : ""} onclick="waterPlant('${plot.id}')">💧 Water</button>`;
  }

  return `<div class="${cls}">
    ${badge}
    <div class="plant-emoji">${currentEmoji}</div>
    <div class="plant-name">${plot.plant_type}</div>
    ${dots}
    <div class="progress-bar"><div class="progress-fill" style="width:${progress * 100}%"></div></div>
    <div class="time-left">${timeLeft}</div>
    ${waterHtml}
    <div class="actions">${actionHtml}</div>
  </div>`;
}

// ═══════════════════════════════════════
// SHOP
// ═══════════════════════════════════════
function openShop() {
  shopTab = "seeds";
  shopSearch = "";
  const overlay = document.getElementById("app");
  const shopEl = document.createElement("div");
  shopEl.id = "shop-overlay";
  shopEl.className = "overlay open";
  shopEl.onclick = (e) => { if (e.target === shopEl) closeShop(); };
  overlay.appendChild(shopEl);
  renderShop();
}

function closeShop() {
  const el = document.getElementById("shop-overlay");
  if (el) el.remove();
}

function renderShop() {
  const el = document.getElementById("shop-overlay");
  if (!el) return;
  const landCost = getLandCost(state.totalPlots);

  let body = "";
  if (shopTab === "seeds") {
    const plants = getAllPlants().filter(p => p.name.toLowerCase().includes(shopSearch.toLowerCase()));
    body = `<div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="search-input" placeholder="Search plants..." value="${shopSearch}" oninput="shopSearch=this.value; renderShop(); this.focus()">
    </div>
    <div class="plant-list">
      ${plants.map((p, i) => `<div class="plant-row${state.coins < p.cost ? " disabled" : ""}" ${state.coins < p.cost ? "" : `onclick="buySeedFromShop('${p.name}')"`}>
        <div class="pemoji">${p.phases[p.phases.length - 1]}</div>
        <div class="pinfo">
          <div class="pname">${p.name}</div>
          <div class="pmeta">
            <span>⏱️ ${formatGrowthTime(p.growthHours)}</span>
            <span>💧 every ${formatGrowthTime(p.waterInterval)}</span>
            <span class="preward">+${p.reward}🪙</span>
          </div>
        </div>
        <button class="btn ${state.coins < p.cost ? "btn-outline" : "btn-primary"} btn-sm" ${state.coins < p.cost ? "disabled" : ""}>${p.cost}🪙</button>
      </div>`).join("")}
    </div>`;
  } else {
    body = `<div class="land-card">
      <div class="emoji">🏗️</div>
      <div class="title">Buy New Plot</div>
      <div class="sub">You currently have ${state.totalPlots} plots</div>
      <div class="hint">Each new plot costs more than the last</div>
      <button class="btn ${state.coins < landCost ? "btn-outline" : "btn-primary"}" ${state.coins < landCost ? "disabled" : ""} onclick="buyLand()">🌳 Buy for ${landCost}🪙</button>
    </div>
    <div class="land-next">Next plot after this will cost ${getLandCost(state.totalPlots + 1)}🪙</div>`;
  }

  el.innerHTML = `<div class="overlay-content">
    <div class="overlay-header">
      <div class="overlay-title">
        <span style="display:flex;align-items:center;gap:8px">🛒 Garden Shop</span>
        <span class="overlay-coins">🪙 ${state.coins} coins</span>
      </div>
    </div>
    <div class="overlay-body">
      <div class="tabs">
        <div class="tab${shopTab === "seeds" ? " active" : ""}" onclick="shopTab='seeds'; renderShop();">🌱 Seeds</div>
        <div class="tab${shopTab === "land" ? " active" : ""}" onclick="shopTab='land'; renderShop();">🟫 Land</div>
      </div>
      ${body}
    </div>
  </div>`;
}

function buySeedFromShop(plantName) {
  const emptyPlot = state.plots.find(p => !p.plant_type);
  if (emptyPlot) {
    plantSeed(emptyPlot.id, plantName);
    closeShop();
  } else {
    alert("All your plots are occupied! Harvest or clear one first.");
  }
}

// ═══════════════════════════════════════
// PLANT PICKER (from empty plot)
// ═══════════════════════════════════════
let pickerSearch = "";

function openPicker(plotId) {
  pickerPlotId = plotId;
  pickerSearch = "";
  const overlay = document.getElementById("app");
  const pickerEl = document.createElement("div");
  pickerEl.id = "picker-overlay";
  pickerEl.className = "overlay open";
  pickerEl.onclick = (e) => { if (e.target === pickerEl) closePicker(); };
  overlay.appendChild(pickerEl);
  renderPicker();
}

function closePicker() {
  pickerPlotId = null;
  const el = document.getElementById("picker-overlay");
  if (el) el.remove();
}

function renderPicker() {
  const el = document.getElementById("picker-overlay");
  if (!el || !pickerPlotId) return;
  const plants = getAllPlants().filter(p => p.name.toLowerCase().includes(pickerSearch.toLowerCase()));

  el.innerHTML = `<div class="overlay-content" style="max-width:28rem">
    <div class="overlay-header" style="background:white;border-bottom:1px solid var(--border)">
      <div class="overlay-title" style="gap:8px">
        <span style="display:flex;align-items:center;gap:8px">🌱 Choose a Seed</span>
        <span class="overlay-coins">🪙 ${state.coins}</span>
      </div>
    </div>
    <div class="overlay-body">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" placeholder="Search..." value="${pickerSearch}" oninput="pickerSearch=this.value; renderPicker(); this.focus()">
      </div>
      <div class="plant-list">
        ${plants.map(p => `<div class="plant-row${state.coins < p.cost ? " disabled" : ""}" ${state.coins < p.cost ? "" : `onclick="selectSeed('${p.name}')"`}>
          <div class="pemoji">${p.phases[p.phases.length - 1]}</div>
          <div class="pinfo">
            <div class="pname">${p.name}</div>
            <div class="pmeta">
              <span>⏱️ ${formatGrowthTime(p.growthHours)}</span>
              <span class="preward">+${p.reward}🪙</span>
            </div>
          </div>
          <div class="pcost">${p.cost}🪙</div>
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function selectSeed(plantName) {
  if (pickerPlotId) {
    plantSeed(pickerPlotId, plantName);
    closePicker();
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
setInterval(checkDeaths, 10000);   // check for dead plants every 10s
setInterval(render, 30000);         // refresh growth progress every 30s
</script>
</body>
</html>
